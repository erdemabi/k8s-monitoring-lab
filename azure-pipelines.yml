trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

# 1. Değişkenler ve Secret Grupları Burada Tanımlanır
variables:
  - group: k8smonitoringv2 # Variable Group adın
  - name: resourceGroup
    value: 'k8s-monitoring-v2'
  - name: location
    value: 'westeurope'
  - name: clusterName
    value: 'aks-lab-cluster'
  - name: azureServiceConnection
    value: 'SC-Azure-Erdem'
  - name: dockerRegistryConnection
    value: 'Monitoring-ACR-Conn' # Bu ismi Service Connection'da oluşturduğun isimle aynı yap
  - name: imageRepository
    value: 'monitoring-app'

stages:
- stage: DeployAKS
  displayName: 'AKS ve Monitoring Kurulumu'
  jobs:
  - job: AzureCLI
    displayName: 'Azure CLI ile Altyapı Kontrol Et ve Kur'
    steps:
    # 2. Azure CLI Task (Sadece Bash komutları içerir)
    - task: AzureCLI@2
      displayName: 'Altyapı Kontrolü'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az group create --name $(resourceGroup) --location $(location)

          exists=$(az aks list --query "[?name=='$(clusterName)' && resourceGroup=='$(resourceGroup)'] | length(@)")

          if [ "$exists" -eq "0" ]; then
            echo "--> AKS bulunamadı, yeni kurulum başlatılıyor..."
            az aks create \
              --resource-group $(resourceGroup) \
              --name $(clusterName) \
              --node-count 1 \
              --node-vm-size Standard_D2s_v3 \
              --generate-ssh-keys
          else
            echo "--> AKS zaten mevcut. Durumu kontrol ediliyor..."
            powerState=$(az aks show --resource-group $(resourceGroup) --name $(clusterName) --query "powerState.code" -o tsv)
            if [ "$powerState" == "Stopped" ]; then
              echo "--> Cluster durdurulmuş, başlatılıyor..."
              az aks start --resource-group $(resourceGroup) --name $(clusterName)
            else
              echo "--> Cluster zaten çalışır durumda."
            fi
          fi

          az aks get-credentials --resource-group $(resourceGroup) --name $(clusterName) --overwrite-existing
          echo "--> Altyapı başarıyla hazırlandı!"

    # 3. Docker Login Task (AzureCLI task'ının DIŞINDA olmalı)
    - task: Docker@2
      displayName: 'Docker Login'
      inputs:
        containerRegistry: '$(dockerRegistryConnection)'
        command: 'login'